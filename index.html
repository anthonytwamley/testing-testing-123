<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plant Selector</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header class="hero">
    <div class="wrap">
      <h1>Plant Selector</h1>
      <p>Filter plants by type, growing conditions, season of interest, maintenance, wildlife value, and use.</p>
    </div>
  </header>

  <main class="wrap layout">
    <aside class="panel filters">
      <div class="panel-header">
        <h2>Filters</h2>
        <button id="resetBtn" class="ghost-btn" type="button">Reset</button>
      </div>

      <label><span>Search name</span><input id="searchInput" type="text" placeholder="Latin or common name" /></label>
      <label><span>Plant type</span><select id="typeFilter"><option value="">All</option></select></label>
      <label><span>Colour</span><select id="colourFilter"><option value="">All</option></select></label>
      <label><span>Feature of interest</span><select id="featureFilter"><option value="">All</option></select></label>

      <div class="filter-group">
        <h3>Light</h3>
        <label class="check"><input type="checkbox" id="fullSunFilter"> Full sun</label>
        <label class="check"><input type="checkbox" id="partialShadeFilter"> Partial shade</label>
        <label class="check"><input type="checkbox" id="fullShadeFilter"> Full shade</label>
      </div>

      <div class="filter-group">
        <h3>Aspect</h3>
        <label class="check"><input type="checkbox" id="northFilter"> North</label>
        <label class="check"><input type="checkbox" id="eastFilter"> East</label>
        <label class="check"><input type="checkbox" id="southFilter"> South</label>
        <label class="check"><input type="checkbox" id="westFilter"> West</label>
      </div>

      <div class="filter-group">
        <h3>Soil type</h3>
        <label class="check"><input type="checkbox" id="clayFilter"> Clay</label>
        <label class="check"><input type="checkbox" id="loamFilter"> Loam</label>
        <label class="check"><input type="checkbox" id="sandFilter"> Sand</label>
        <label class="check"><input type="checkbox" id="chalkFilter"> Chalk</label>
      </div>

      <div class="filter-group">
        <h3>Soil acidity</h3>
        <label class="check"><input type="checkbox" id="acidFilter"> Acid</label>
        <label class="check"><input type="checkbox" id="neutralFilter"> Neutral</label>
        <label class="check"><input type="checkbox" id="alkalineFilter"> Alkaline</label>
      </div>

      <div class="filter-group">
        <h3>Season of interest</h3>
        <label class="check"><input type="checkbox" id="springFilter"> Spring</label>
        <label class="check"><input type="checkbox" id="summerFilter"> Summer</label>
        <label class="check"><input type="checkbox" id="autumnFilter"> Autumn</label>
        <label class="check"><input type="checkbox" id="winterFilter"> Winter</label>
      </div>

      <div class="filter-group">
        <h3>Other</h3>
        <label class="check"><input type="checkbox" id="wildlifeFilter"> Wildlife value</label>
        <label class="check"><input type="checkbox" id="deciduousFilter"> Deciduous</label>
        <label class="check"><input type="checkbox" id="evergreenFilter"> Evergreen</label>
        <label class="check"><input type="checkbox" id="semiEvergreenFilter"> Semi-evergreen</label>
        <label class="check"><input type="checkbox" id="lowMaintenanceFilter"> Low maintenance</label>
        <label class="check"><input type="checkbox" id="moderateMaintenanceFilter"> Moderate maintenance</label>
        <label class="check"><input type="checkbox" id="highMaintenanceFilter"> High maintenance</label>
      </div>

      <div class="filter-group">
        <h3>Uses</h3>
        <label class="check"><input type="checkbox" id="flowerBorderBedFilter"> Flower border / bed</label>
        <label class="check"><input type="checkbox" id="groundCoverFilter"> Ground cover</label>
        <label class="check"><input type="checkbox" id="hedgingFilter"> Hedging</label>
        <label class="check"><input type="checkbox" id="screenFilter"> Screen</label>
        <label class="check"><input type="checkbox" id="planterFilter"> Planter / patio / container</label>
        <label class="check"><input type="checkbox" id="bankSlopeFilter"> Bank / slope</label>
        <label class="check"><input type="checkbox" id="climberFilter"> Climber</label>
      </div>
    </aside>

    <section>
      <div class="panel topbar">
        <div>
          <h2>Results</h2>
          <p id="resultCount">Loading plants…</p>
        </div>
      </div>
      <div id="resultsGrid" class="results-grid"></div>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
